# =====================================================================
#                      Global Configuration (config.yaml)
# =====================================================================

# [1. Authentication & Push Notification Configuration]
auth:
  llm_api_key: "YOUR_LLM_API_KEY_HERE" # Replace with your OpenAI/DeepSeek API key
  pushplus_token: "YOUR_PUSHPLUS_TOKEN_HERE" # Replace with your PushPlus token



# [2. Proxy Configuration] (Leave as empty string "" if no proxy is needed)
proxy:
  http: ""  # e.g., "http://127.0.0.1:7890"
  https: "" # e.g., "http://127.0.0.1:7890"



# [3. arXiv Crawler Hyperparameters]
arxiv:
  query: 'abs:"diffusion" OR abs:"synthesis" OR abs:"adversarial"' # Logical search query for arXiv API
  must_have_keywords: # Local hard-filter applied to the title and summary
    - "diffusion"
    - "synthesis"
    - "adversarial"
  hard_limit: 100       # Maximum raw papers to fetch before local processing (prevents API bloat)
  max_retries: 10     # Maximum network connection retries per pagination fetch
  timeout: 15         # Connection timeout in seconds
  retry_delay: 3      # Wait time in seconds between retries

# [4. Intelligent Filtering Hyperparameters]
filter:
  pre_filter_k: 25    # Number of candidates to retain after Level 2 (title-based) pre-filtering
  top_k_papers: 5     # Final number of papers to include in the WeChat Markdown report

# [5. LLM Configuration & Hyperparameters]
llm:
  base_url: "https://api.deepseek.com/chat/completions" # Base endpoint for the API
  model_reasoning: "deepseek-reasoner" # Advanced model for deep abstract analysis (Level 3)
  model_chat: "deepseek-chat"          # Fast, cost-effective model for title screening & formatting
  temp_reasoning: 0.1                  # Low temperature for deterministic scoring logic
  temp_chat: 0.5                       # Medium temperature for readable markdown synthesis

# [6. Core Scoring & Tagging Criteria]
# Rationale: These formalized variables are injected into the prompts below.
criteria:
  # CURRENT_FOCUS: The absolute highest priority context.
  current_focus: "Application of Diffusion Models for medical image segmentation data synthesis and data augmentation to enhance downstream classification/segmentation utility. Core interests include: diffusion-driven adversarial attacks and sample synthesis, analysis of latent input noise spaces, memory vs. generalization effects, long-tailed/class-imbalanced generation, and training-free or plug-and-play strategies to improve synthesis diversity and fidelity."
  
  # RESEARCH_KEYWORDS: The domain and methodology matrix.
  research_keywords:
    core_domains: ["Diffusion Models", "Image Synthesis", "Adversarial Attacks", "Medical Imaging", "Downstream Optimization via Synthetic Data"]
    methodologies: ["Memory & Generalization", "Controllable Generation", "Conditional Guidance", "Noise Optimization", "Initial Noise Latent", "CFG", "Synthetic Data Statistics", "Downstream Benefit Analysis", "Data Augmentation", "Representation Learning"]
    
  # NEGATIVE_PROMPT: Domains strictly outside the scope of this research.
  negative_prompt: ["Pure NLP", "Video" , "Remote Sensing", "Astronomy", "Finance", "Signal Processing", "Audio", "Embodied Intelligence", "Gaussian Splatting", "Encryption/Decryption", "Autonomous Driving", "3D Point Cloud", "Video Sequences", "Human Pose", "Facial Analysis"]


  top_venues: ["CVPR", "TMI", "TPAMI", "ICLR", "ICCV", "ECCV", "NeurIPS", "NIPS", "ICML", "TIP", "MICCAI", "MedIA", "Nature", "AAAI"]

# =====================================================================
# [7. LLM Prompt Engineering Section]
# =====================================================================
# Rationale: This pipeline implements a "Multi-Stage Filtering Funnel".
# Prompts are written in English to optimize LLM logic processing, but 
# output formatting specifies Chinese for the end-user WeChat experience.
# Tricks Applied: Context Anchoring, Anti-Hallucination Protocols, Chain-of-Thought.
# =====================================================================

prompts:
  # ---------------------------------------------------------------------
  # 1. Level-2 Pre-Filter Prompt (Title-Based Screening)
  # ---------------------------------------------------------------------
  pre_filter_prompt: |
    You are an expert academic curator specializing in Computer Vision. Your task is to perform a high-speed semantic screening of paper titles.

    # [PART 1: SCREENING CRITERIA & CONTEXT]
    - RESEARCH_FOCUS (Highest Priority): {CURRENT_FOCUS}
    - TARGET_DOMAINS: {RESEARCH_KEYWORDS_CORE}
    - TARGET_METHODS: {RESEARCH_KEYWORDS_METHOD}
    - EXCLUSION_LIST: {NEGATIVE_PROMPT}

    # [PART 2: SELECTION LOGIC]
    1. EXCLUDE: Titles strictly dedicated to EXCLUSION_LIST domains.
       *EXCEPTION*: Do NOT exclude if the title suggests the use of models (like LLMs/VLMs) merely as *tools* for Medical/Natural Image tasks.
    2. PRIORITIZE: Titles that strongly align with the RESEARCH_FOCUS. If FOCUS is empty, fallback to prioritizing titles explicitly mentioning TARGET_DOMAINS or TARGET_METHODS.
    3. SELECTION: Identify the top {PRE_FILTER_K} most promising papers. 
    
    # [GROUNDING RULE]: Base your selection strictly on the lexical semantic meaning of the provided titles. Do not hallucinate paper contents.

    # [PART 3: CANDIDATE TITLES]
    {TITLE_LIST}

    # [PART 4: OUTPUT SPECIFICATION]
    Return ONLY a raw JSON array of the indices of the selected papers. 
    Example Output: [0, 3, 12, 15]
    Do not include markdown code blocks, indices labels, or explanations.

  # ---------------------------------------------------------------------
  # 2. Level-3 Deep Evaluation Prompt (Abstract-Based Scoring)
  # ---------------------------------------------------------------------
  evaluate_prompt: |
    You are a rigorous academic reviewer. Perform a multi-dimensional quantitative evaluation of the provided paper based on the following [Formalized Criteria].

    # [ANTI-HALLUCINATION PROTOCOL]
    Base your evaluation STRICTLY on the provided TITLE, SUMMARY, and REMARKS. Do not assume or hallucinate datasets, metrics, or methodologies.

    # [PART 1: VARIABLE DEFINITIONS]
    - CORE_DOMAINS: {RESEARCH_KEYWORDS_CORE}
    - METHODOLOGIES: {RESEARCH_KEYWORDS_METHOD}
    - RESEARCH_FOCUS: {CURRENT_FOCUS}
    - EXCLUSION_LIST: {NEGATIVE_PROMPT}
    - TOP_VENUES: {TOP_VENUES}

    # [PART 2: EVALUATION LOGIC OPERATORS]

    ## STEP 1: BOUNDARY CHECK (Tool vs. Domain Exception)
    IF (The paper's PRIMARY application is within EXCLUSION_LIST):
       SET RELEVANCE = 0, TERMINATE AND OUTPUT JSON
    ELSE IF (The paper merely USES tools like LLMs/VLMs to solve Medical or Natural Image tasks):
       PROCEED TO STEP 2
    ELSE:
       PROCEED TO STEP 2

    ## STEP 2: METRIC SCORING (Quantitative Assessment)
    Assign independent scores for the following dimensions:
    1. Domain_Score (D): 2 (Core), 1 (Related), 0 (Irrelevant).
    2. Method_Score (M): 1 (Uses TARGET_METHODS), 0 (Obsolete/Generic).
    3. Alignment_Score (A): 2 (Core alignment), 1 (Potential transfer), 0 (None/Empty), -1 (Mismatch).

    ## STEP 3: VENUE BONUS (Quality Boost)
    IF (REMARKS state acceptance by TOP_VENUES): SET Venue_Bonus = 1 ELSE: SET Venue_Bonus = 0

    ## STEP 4: SYNTHESIS (Final Score Calculation)
    - FORMULA: Total_Score = D + M + A + Venue_Bonus
    - SPECIAL_RULE: IF (A == 2 AND D >= 1) THEN Total_Score = 5 (Priority Pass).
    - CONSTRAINTS: Clamp the final score. MAX_SCORE = 5. MIN_SCORE = 0.

    ## STEP 5: TIE-BREAKER (Novelty/Impact)
    Assign a Novelty_Score (1-10) evaluating the theoretical innovation or practical impact of the paper. This will STRICTLY be used to break ties if multiple papers have the same Total_Score.

    # [PART 3: PAPER METADATA]
    - TITLE: {TITLE}
    - SUMMARY: {SUMMARY}
    - REMARKS: {REMARKS}

    # [PART 4: OUTPUT SPECIFICATION]
    Return ONLY a valid JSON object. Do not include conversational text or markdown code blocks.
    {{
        "thought_trace": "D:{D_score}, M:{M_score}, A:{A_score}, Bonus:{Venue_Bonus}. [Brief rationale: Translate into Chinese]",
        "relevance": [Total_Score],
        "novelty": [Novelty_Score]
    }}

  # ---------------------------------------------------------------------
  # 3. Final Beautification & Synthesis Prompt (Markdown Brief)
  # ---------------------------------------------------------------------
  beautify_prompt: |
    You are an elite AI Academic Researcher. I will provide {TOP_K} latest academic papers that have passed rigorous preliminary screening.
    Your task is to deeply analyze these papers, synthesize their core contributions, and generate a beautifully formatted Markdown brief.

    [INPUT DATA]
    {RAW_CONTENT}

    [OUTPUT LANGUAGE]
    The final Markdown content MUST be written in highly professional Academic Chinese.

    [ANTI-HALLUCINATION & GROUNDING RULES]
    1. Your synthesis MUST be derived exclusively from the provided `RAW_CONTENT`.
    2. Do NOT invent, guess, or inject external background information, experimental results, or methodologies.
    3. If a specific detail (e.g., exact accuracy metrics or specific datasets) is not mentioned in the abstract, use high-level descriptive language rather than fabricating facts.

    [EMOJI MAPPING RULES]
    Map the `relevance` score to the exact following labels (Do NOT output the raw numbers):
    - Score 5: 🌟🌟🌟🌟🌟 (核心必读！)
    - Score 4: 🌟🌟🌟🌟 (重点关注！)
    - Score 3: 🌟🌟🌟 (值得参考~)
    - Score 2: 🌟🌟 (看看就行)
    - Score 1: 🌟 (今天相关文献太少了？)

    [FORMATTING REQUIREMENTS]
    1. Main Header: 🚀 今日精选文献速递 ({TODAY_STR} | Top {TOP_K})
    2. Sort the papers in descending order based on their relevance score.
    3. Each paper MUST strictly follow this layout (HTML tags must be preserved):
       ### **[Paper Title in Original English]**
       - 🎯 **相关度**: [Insert Mapped Emoji Label]
       - 👤 **作者**: (Extract from data)
       - 🏛️ **发表/备注**: (Extract from data, omit line if empty)
       - 🔗 [https://arxiv.org/abs/...](https://arxiv.org/abs/...)
       - 💡 **深度剖析**: (Extract and synthesize based strictly on the abstract)
         - <span style="color: #2c3e50;">**研究背景**</span>: ...(Concise academic background)
         - <span style="color: #c0392b;">**核心痛点**</span>: ...(What specific problem is being solved?)
         - <span style="color: #16a085;">**创新方法**</span>: ...(What is the proposed technical solution?)
         - <span style="color: #8e44ad;">**结论与影响**</span>: ...(Reported experimental results and domain impact)
         
    4. Provide PURE Markdown text only. Do NOT wrap the output in ```markdown blocks. Preserve all HTML <span> color tags for mobile optimization.
